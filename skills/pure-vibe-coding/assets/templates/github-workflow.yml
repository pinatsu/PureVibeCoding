name: Pure Vibe Coding

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pinatsu/PureVibeCoding@main
        with:
          file: .pure-vibe-coding.json
