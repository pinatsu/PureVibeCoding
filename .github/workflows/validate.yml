name: Validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  example-attestation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/validate-attestation.mjs examples/attestation/.pure-vibe-coding.json
